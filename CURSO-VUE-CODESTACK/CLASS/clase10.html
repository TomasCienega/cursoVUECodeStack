<!-- 10 - Manejo de Eventos [Vue.js 3] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- BOOSTRAP -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> -->
     <!-- MATERIALIZE -->
     <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">  
</head>
<body>
    
    <div id="app" class="m-3">

        <!-- <button class="btn indigo darken-4" @click="(contador++)">Haz clic</button>         -->
        <button class="btn indigo darken-4" v-on:click="(contador++)">Haz clic</button>
        {{contador}}
        <hr>
        <!-- <button class="btn bl darken-4" v-on:mouseover="(estado = !estado)">Coloca el puntero sobre mi</button>         -->
        <button class="btn bl darken-4" v-on:mouseout="(estado = false)" v-on:mouseover="(estado = true)">Coloca el puntero sobre mi</button>          
        {{estado}}
        <!-- <img src="shion.jpg" v-if="(estado)"> -->
        <!-- <img src="shion.jpg" v-show="(estado)"> -->
         <select v-on:change="cambiarImagen($event)" class="browser-default">
            <option value="shion.jpg">SHION</option>
            <option value="ikaros.jpg">IKAROS</option>
         </select>
        <img v-bind:src="imagen">
    </div>



    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        //data,methods,props,mounted,created,computed,watch,destroyed
        //v-if, v-else, v-else-if
        // keydown, load, mouse, mouseover
        //display: inline|show
         const app ={
            data(){
                return{
                    contador: 0,
                    estado: false,
                    imagen: ''
                }
            },
            methods: {
               cambiarImagen(event){
                this.imagen = event.target.value;
               }
            },
            mounted(){
                
            }
         }       
         var mountedApp = Vue.createApp(app).mount("#app")
    </script>
    <!-- BOOSTRAP -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> -->
     <!-- MATERIALIZE -->
     <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
