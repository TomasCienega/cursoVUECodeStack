<!-- 15 - Propiedades Calculadas [Vue.js 3] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- BOOSTRAP -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> -->
     <!-- MATERIALIZE -->
     <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">  
</head>
<body>
    
    <div id="app" class="m-3">
        <div class="container" style="padding-top:50px;">
            <input type="text" v-model="n1">
            <input type="text" v-model="n2">
            <h5>La suma es {{resultado}}</h5>
        </div>
        <hr>
        <div class="container">
            <label >Escriba una fruta</label>
            <input type="text" v-model="fruta">
            <button type="button" v-on:click="agregarFruta">Agregar Fruta</button>
            <label >Ha agregado un total de {{total_frutas}} frutas</label>
            <ul>
                <li v-for=" fruta in frutas">{{fruta}}</li>
            </ul>
        </div>
    </div>



    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>

         const app ={
            data(){
                return{
                    n1:0,
                    n2:0,
                    fruta: '',
                    frutas: []
                }
            },
            methods: {
                agregarFruta()
                {
                    this.frutas.push(this.fruta);
                    this.fruta = '';    
                }
            },
            mounted(){
                
            },
            computed: {
                resultado: function () 
                {  
                    return parseFloat(this.n1) + parseFloat(this.n2);
                },
                total_frutas: function()
                {
                    return this.frutas.length;
                }
            }
         }       
         var mountedApp = Vue.createApp(app).mount("#app")
    </script>
    <!-- BOOSTRAP -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> -->
     <!-- MATERIALIZE -->
     <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
