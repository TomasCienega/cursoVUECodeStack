<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- BOOSTRAP -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> -->
     <!-- MATERIALIZE -->
     <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">  
</head>
<body>
    
    <div id="app" class="m-3">
        <h5 id="contenedr">{{nombre}}</h5>
    </div>



    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>

         const app ={
            data(){
                return{
                    nombre: 'Tomas'
                }
            },
            beforeCreate(){
                console.log('Antes de ser creado. Nombre contiene: ', this.nombre);
            },
            created(){
                console.log('Ha sido creado. Nombre contiene: ', this.nombre);
            },
            beforeMount(){
                console.log('Antes de ser montado. Nombre contiene: ', this.nombre);
            },
            mounted(){
                console.log('Ha sido montado. Nombre contiene:', this.nombre);
            },
            beforeUpdate(){
                console.log('Valor actual: ' + document.querySelector('#contenedor').innerHTML);
            },
            updated(){
                console.log('Valor nuevo: ' + document.querySelector('#contenedor').innerHTML);
            },
            beforeUnmount(){
                console.log('Esta a punto de desmontarse. Nombre contiene', this.nombre);                
            },
            unmounted(){
                console.log('Ha sido Desmontado. Nombre contiene', this.nombre);                
            }
         }       
         var mountedApp = Vue.createApp(app).mount("#app")
    </script>

     <!-- MATERIALIZE -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
