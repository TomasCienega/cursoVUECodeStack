<!-- 05 - Bucles: Estructura v-for, Recorrido de Arrays y Creación de Listas [Vue.js 3] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    
    <div id="app" class="m-3">
        <ul>
            <li v-for="fruta in frutas" v-bind:key="fruta">{{fruta}}</li>
        </ul>
        <hr>
        <ul>
            <li v-for="fruta in frutasConID" v-bind:key="fruta">{{fruta}}</li>
        </ul>
        <hr>
        <ul>
            <li v-for="(fruta, index) in frutasConID" v-bind:key="fruta">Indice: {{index}} {{fruta.id}} - {{fruta.nombre}}</li>
        </ul>
        <hr>
        <select>
            <option v-bind:value="frutaId">--Selecciona una opcion--</option>
            <option v-for="fruta in frutasConID" v-bind:value="fruta.id">{{fruta.nombre}}</option>option>
        </select>

    </div>


    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        //data,methods,props,mounted,created,computed,watch,destroyed
         const app ={
            data(){
                return{
                    frutaId: '',
                    frutas: ['Manzana', 'Sandia', 'Uva', 'Platano'],
                    frutasConID: [
                        {
                            id:1,
                            nombre: "Melon"
                        },
                        {
                            id:2,
                            nombre: "Pera"
                        },
                        {
                            id:3,
                            nombre: "Naranja"
                        },
                        {
                            id:4,
                            nombre: "Jicama"
                        }
                    ]
                }
            },methods:{


            }
         }       
         Vue.createApp(app).mount("#app")
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
