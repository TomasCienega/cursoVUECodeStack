<!-- 02 - Llamada de Métodos y Manipulación de Datos: La Reactividad de Vue [Vue.js 3] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>
    
    <div id="app" class="m-1">
        <text class="m-2">Contador: {{contador}}</text>
        <button 
            type="button" 
            v-on:click="stopInterval" 
            class="btn btn-sm" 
            :class="isRunning ? 'btn-outline-danger' : 'btn-outline-success'">
            
            {{ isRunning ? 'Detener' : 'Continuar' }}
        </button>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        //data,methods,props,mounted,created,computed,watch,destroyed
         const holamundo ={
            data(){
                return{
                    contador: 0,
                    interval: null,
                    isRunning: false                    
                }
            },
            mounted(){
                this.interval = setInterval(()=>{
                    this.contador++;
                },1000);
                this.isRunning = true

            },
            methods: {
                stopInterval(){

                    if(this.isRunning){
                        clearInterval(this.interval);
                        this.isRunning = false
                    }else{
                        this.interval = setInterval(()=>{
                            this.contador++;
                        },1000);  
                        this.isRunning = true                                
                    }
                }
            }
         }

         Vue.createApp(holamundo).mount("#app")
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
