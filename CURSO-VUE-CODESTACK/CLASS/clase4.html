<!-- 04 - Binding de Doble Vía con v-model: Interacción del Usuario [Vue.js 3] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    
    <div id="app" class="m-3">
        <label>Escribe tu nombre: </label>
        <input type="text" v-model="nombre">
        <hr>
        <h5>Hola {{nombre}}</h5>
        <hr>
        <select class="form-select" v-model="fruta">

            <option value="" selected>--Seleccione una opción--</option>
            <option value="Sandia">Sandia</option>
            <option value="Pepino">Pepino</option>
            <option value="Manzana">Manzana</option>

        </select>
        Fruta Seleccionada: {{fruta}}
        <hr>
        <input type="checkbox" v-model="activo">
        {{activo}}
    </div>


    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        //data,methods,props,mounted,created,computed,watch,destroyed
         const app ={
            data(){
                return{

                    nombre: '',
                    fruta: '',
                    activo: false

                }
            },methods:{


            }
         }       
         Vue.createApp(app).mount("#app")
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
