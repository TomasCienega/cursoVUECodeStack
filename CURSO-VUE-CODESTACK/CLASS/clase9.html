<!-- 09 - Renderizado Condicional con v-if [Vue.js 3] -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- BOOSTRAP -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous"> -->
     <!-- MATERIALIZE -->
     <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">  
</head>
<body>
    
    <div id="app" class="m-3">
           <h5 v-if="(num1>num2)">El numero {{num1}} si es mayor que el numero {{num2}}</h5>
           <h5 v-else-if="(num1==num2)">El numero {{num1}} es igual que el numero {{num2}}</h5>
           <h5 v-else>El numero {{num1}} no es mayor que el numero {{num2}}</h5>

            <ul>
                <li v-for="post in posts">
                    <label v-if="(post.id % 2 == 0)">ES ID PAR:</label>
                    <label v-else>ES ID INPAR:</label>
                    {{post.id}} - {{post.title}}
                </li>
            </ul>           
    </div>



    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        //data,methods,props,mounted,created,computed,watch,destroyed
        //v-if, v-else, v-else-if
         const app ={
            data(){
                return{
                    num1: 5,
                    num2: 5,
                    posts: [],
                    posts_pares: [],
                    posts_inpares: []
                }
            },
            methods: {
                getPosts(){
                    fetch('https://jsonplaceholder.typicode.com/posts')
                    .then(response => response.json())
                    .then(data =>{
                        this.posts = data;
                        this.posts_pares = data.filter(x=> (x.id % 2 == 0))
                        this.posts_inpares = data.filter(x=> (x.id % 2 != 0))
                    })
                }                
            },
            mounted(){
                this.getPosts();
            }
         }       
         var mountedApp = Vue.createApp(app).mount("#app")
    </script>
    <!-- BOOSTRAP -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script> -->
     <!-- MATERIALIZE -->
     <!-- Compiled and minified JavaScript -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
</body>
</html>
